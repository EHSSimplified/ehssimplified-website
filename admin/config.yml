backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "Aaron Leff, CSP"}
      - {label: "Topic", name: "topic", widget: "select", options: ["OSHA Compliance", "Workers Comp", "Construction Safety", "Hazard Communication", "Safety Culture", "Manufacturing Safety", "General EHS"]}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
